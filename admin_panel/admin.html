<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Solsureste Solar CRM</title>
    <link rel="preload" href="/fonts/space-grotesk-variable.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/fonts.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            background: #f3f4f6;
            color: #1f2937;
        }
        .hidden { display: none !important; }

        /* --- Login --- */
        #login-screen {
            display: flex; min-height: 100vh; align-items: center; justify-content: center;
            background: #f9fafb;
        }
        .login-card {
            background: #fff; padding: 2rem; border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,.08), 0 4px 6px -4px rgba(0,0,0,.05);
            width: 100%; max-width: 24rem; border: 1px solid #f3f4f6;
        }
        .login-icon-wrap { display: flex; justify-content: center; margin-bottom: 1.5rem; }
        .login-icon {
            display: flex; align-items: center; justify-content: center;
            width: 3rem; height: 3rem; border-radius: 9999px;
            background: #f97316; color: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.05);
        }
        .login-card h2 { font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 1.5rem; color: #1f2937; }
        .field { margin-bottom: 1rem; }
        .field:nth-of-type(2) { margin-bottom: 1.5rem; }
        .field label { display: block; font-size: .875rem; font-weight: 500; color: #374151; margin-bottom: .25rem; }
        .field input {
            width: 100%; border: 1px solid #d1d5db; border-radius: .5rem;
            padding: .625rem 1rem; font: inherit; font-size: .95rem; color: #1f2937;
            transition: border-color .15s, box-shadow .15s;
        }
        .field input:focus {
            outline: none; border-color: #f97316; box-shadow: 0 0 0 1px #f97316;
        }
        .btn-entrar {
            width: 100%; background: #f97316; color: #fff; font-weight: 700;
            padding: .625rem 1rem; border: none; border-radius: .5rem; font-size: .95rem;
            cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,.05); transition: background .15s;
            font-family: inherit;
        }
        .btn-entrar:hover { background: #ea580c; }

        /* --- Dashboard shell --- */
        #dashboard-screen { min-height: 100vh; display: flex; flex-direction: column; }
        nav.topbar {
            background: #111827; color: #fff; padding: 1rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,.1);
        }
        .brand { display: flex; align-items: center; gap: .75rem; }
        .brand-logo {
            display: flex; align-items: center; justify-content: center;
            width: 2rem; height: 2rem; border-radius: .375rem; background: #f97316; color: #fff;
        }
        .brand h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -.01em; }
        .brand h1 span { color: #fb923c; font-weight: 500; }
        .btn-logout {
            font-size: .875rem; font-weight: 500; color: #d1d5db; background: #1f2937;
            border: none; padding: .5rem 1rem; border-radius: .5rem; cursor: pointer;
            transition: background .15s, color .15s; font-family: inherit;
        }
        .btn-logout:hover { background: #374151; color: #fff; }

        main.content { flex: 1; padding: 1.5rem; max-width: 80rem; margin: 0 auto; width: 100%; }
        @media (min-width: 768px) { main.content { padding: 2.5rem; } }

        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap; }
        .page-header h2 { font-size: 1.5rem; font-weight: 700; color: #111827; }
        .page-header p { font-size: .875rem; color: #6b7280; margin-top: .25rem; }
        .page-header-actions { display: flex; gap: .75rem; flex-wrap: wrap; }
        .btn-refresh, .btn-export {
            display: flex; align-items: center; gap: .5rem; background: #fff;
            border: 1px solid #e5e7eb; color: #374151; padding: .5rem 1rem; border-radius: .5rem;
            font-weight: 500; font-size: .9rem; box-shadow: 0 1px 2px rgba(0,0,0,.05);
            cursor: pointer; transition: background .15s; font-family: inherit;
        }
        .btn-refresh:hover, .btn-export:hover { background: #f9fafb; }

        #stats-bar { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        @media (min-width: 768px) { #stats-bar { grid-template-columns: repeat(4, 1fr); } }
        .stat-card {
            background: #fff; border-radius: .75rem; border: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px rgba(0,0,0,.05); padding: 1rem;
        }
        .stat-label { font-size: .75rem; color: #6b7280; text-transform: uppercase; font-weight: 600; margin-bottom: .25rem; }
        .stat-value { font-size: 1.875rem; font-weight: 700; color: #111827; }
        .stat-value.coste { font-size: 1.5rem; }
        .stat-blue { color: #2563eb; }
        .stat-green { color: #16a34a; }
        .stat-orange { color: #f97316; }

        .filters { display: flex; flex-direction: column; gap: .75rem; margin-bottom: 1.5rem; }
        @media (min-width: 640px) { .filters { flex-direction: row; } }
        .filters input, .filters select {
            border: 1px solid #d1d5db; border-radius: .5rem; padding: .625rem 1rem;
            font-size: .875rem; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.05);
            font-family: inherit; color: #1f2937;
        }
        .filters input:focus, .filters select:focus {
            outline: none; border-color: #f97316; box-shadow: 0 0 0 1px #f97316;
        }
        .filters input { flex: 1; }

        .table-card {
            background: #fff; border-radius: .75rem; box-shadow: 0 1px 2px rgba(0,0,0,.05);
            border: 1px solid #e5e7eb; overflow: hidden;
        }
        .table-scroll { overflow-x: auto; }
        table { width: 100%; text-align: left; border-collapse: collapse; }
        thead tr { background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
        thead th {
            padding: 1rem 1.5rem; font-size: .75rem; font-weight: 600; color: #6b7280;
            text-transform: uppercase; letter-spacing: .05em;
        }
        th.col-cliente { width: 33%; }
        th.col-historial { width: 67%; }
        tbody tr { border-bottom: 1px solid #f3f4f6; transition: background .15s; }
        tbody tr:hover { background: #f9fafb; }
        tbody tr.gestionado { opacity: .7; }
        tbody td { padding: 1rem 1.5rem; vertical-align: top; }
        td.col-cliente { border-right: 1px solid #f3f4f6; }
        .empty-row td { padding: 2rem 1.5rem; text-align: center; color: #6b7280; }

        .lead-name { font-weight: 700; color: #111827; font-size: 1.125rem; }
        .lead-id { font-size: .75rem; color: #9ca3af; font-family: monospace; margin-top: .125rem; }
        .lead-created { font-size: .75rem; color: #9ca3af; margin-top: .125rem; }
        .lead-info { margin: .75rem 0 1rem; font-size: .875rem; color: #4b5563; }
        .lead-info-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .375rem; }
        .lead-info-row.cost { font-size: .75rem; color: #9ca3af; }

        .badges-row { display: flex; flex-wrap: wrap; gap: .25rem; margin-bottom: .75rem; }
        .badge {
            display: inline-flex; align-items: center; padding: .25rem .625rem; border-radius: 9999px;
            font-size: .75rem; font-weight: 700; border: 1px solid;
        }
        .badge-default { background: #f3f4f6; color: #374151; border-color: #e5e7eb; }
        .badge-cualificador { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
        .badge-agendador { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
        .badge-terminar { background: #e5e7eb; color: #374151; border-color: #d1d5db; }
        .badge-lead-directo { background: #111827; color: #fff; border-color: #1f2937; }
        .badge-gestionado { background: #f3e8ff; color: #6b21a8; border-color: #e9d5ff; margin-left: .25rem; }
        .badge-crm-ok { background: #e0f2fe; color: #075985; border-color: #bae6fd; }
        .badge-crm-pendiente { background: #fef3c7; color: #92400e; border-color: #fde68a; }

        .actions-row { display: flex; gap: .5rem; padding-top: .5rem; border-top: 1px solid #f3f4f6; }
        .btn-action {
            font-size: .75rem; font-weight: 500; padding: .375rem .75rem; border-radius: .5rem;
            border: 1px solid; cursor: pointer; transition: background .15s; font-family: inherit;
        }
        .btn-marcar { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
        .btn-marcar:hover { background: #dcfce7; }
        .btn-desmarcar { background: #f3f4f6; color: #4b5563; border-color: #e5e7eb; }
        .btn-desmarcar:hover { background: #e5e7eb; }
        .btn-eliminar { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
        .btn-eliminar:hover { background: #fee2e2; }

        .chat-panel {
            display: flex; flex-direction: column; gap: .75rem; padding: 1rem;
            max-height: 350px; overflow-y: auto; background: #f3f4f6; border-radius: .75rem;
            border: 1px solid #e5e7eb; box-shadow: inset 0 2px 4px rgba(0,0,0,.05);
        }
        .chat-bubble { padding: .75rem; border-radius: .5rem; max-width: 85%; font-size: .875rem; box-shadow: 0 1px 2px rgba(0,0,0,.05); border: 1px solid; }
        .chat-bubble strong { display: block; margin-bottom: .25rem; }
        .chat-user { background: #dbeafe; color: #1e3a8a; align-self: flex-start; border-color: #bfdbfe; }
        .chat-user strong { color: #1d4ed8; }
        .chat-assistant { background: #fff; color: #1f2937; align-self: flex-end; border-color: #e5e7eb; }
        .chat-assistant strong { color: #f97316; }
        .chat-empty { font-size: .875rem; color: #6b7280; font-style: italic; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <div class="login-icon-wrap">
                <span class="login-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
            </div>
            <h2>Acceso Admin</h2>
            <div class="field">
                <label>Usuario</label>
                <input type="text" id="username" placeholder="admin">
            </div>
            <div class="field">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="•••••">
            </div>
            <button class="btn-entrar">Entrar al Panel</button>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden">

        <nav class="topbar">
            <div class="brand">
                <span class="brand-logo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                </span>
                <h1>Solsureste Solar <span>CRM</span></h1>
            </div>
            <button class="btn-logout">Cerrar Sesión</button>
        </nav>

        <main class="content">

            <div class="page-header">
                <div>
                    <h2>Leads Captados</h2>
                    <p>Contactos extraídos de forma automática por la IA.</p>
                </div>
                <div class="page-header-actions">
                    <button class="btn-export">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Exportar CSV
                    </button>
                    <button class="btn-refresh">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                        Refrescar
                    </button>
                </div>
            </div>

            <div id="stats-bar">
                <div class="stat-card">
                    <div class="stat-label">Total Leads</div>
                    <div id="stat-total" class="stat-value">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">En Proceso</div>
                    <div id="stat-en-proceso" class="stat-value stat-blue">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Gestionados</div>
                    <div id="stat-gestionados" class="stat-value stat-green">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Coste Total IA</div>
                    <div id="stat-coste" class="stat-value coste stat-orange">—</div>
                </div>
            </div>

            <div class="filters">
                <input
                    type="text"
                    id="buscador"
                    placeholder="Buscar por nombre, correo, teléfono o ciudad..."
                >
                <select id="filtroEstado">
                    <option value="">Todos los estados</option>
                    <option value="CUALIFICADOR">CUALIFICADOR</option>
                    <option value="AGENDADOR">AGENDADOR</option>
                    <option value="TERMINAR">TERMINAR</option>
                    <option value="LEAD_DIRECTO">LEAD_DIRECTO</option>
                    <option value="INICIO">INICIO</option>
                    <option value="__GESTIONADOS__">Solo gestionados</option>
                </select>
            </div>

            <div class="table-card">
                <div class="table-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th class="col-cliente">Datos del Cliente</th>
                                <th class="col-historial">Historial de Conversación</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-clientes"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

<script src="/admin.js"></script>
</body>
</html>
