<!--
CÓMO CREAR UNA PÁGINA NUEVA (ciudad o servicio), fase 2 de SEO:

1. Duplicar este fichero como static/<slug>.html (ej: static/placas-solares-lorca.html)
2. Rellenar los {{PLACEHOLDERS}} del <head> y el JSON-LD:
   - {{TITLE}}       → título único, <60 caracteres, con la ciudad/servicio + "Solsureste Solar"
   - {{DESCRIPTION}} → meta description única, <=155 caracteres
   - {{URL}}         → https://solsurestesolar.com/<slug>
   - {{JSON_LD}}     → usar LocalBusiness/HomeAndConstructionBusiness con areaServed específico
                        (la ciudad/comarca concreta) para páginas de ciudad, o Service para páginas
                        de servicio (residencial, industrial, huertos solares, mantenimiento).
3. Registrar la ruta limpia en api.py, mismo patrón que /faq:
     @app.get("/<slug>")
     def <slug>_page():
         return FileResponse("static/<slug>.html")
4. Añadir la URL a static/sitemap.xml (priority 0.6, changefreq monthly, según la convención ya
   documentada en ese fichero).
5. Enlazar la nueva página desde algún sitio interno real (footer o sección de la home) — nunca
   dejarla huérfana sin enlaces entrantes desde el resto del sitio.
6. Repetir la checklist de verificación del plan de SEO: JSON-LD válido, robots.txt no la bloquea,
   HTTP 200, GA4 carga vía /consent.js, contenido específico y no duplicado del resto de páginas.

Este fichero vive fuera de static/ a propósito: StaticFiles(directory="static", html=True) nunca lo
sirve, así que no hay riesgo de que quede indexado como contenido fantasma antes de completarse.
-->
<!DOCTYPE html>

<script type="application/ld+json">
{{JSON_LD}}
</script>
